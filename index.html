<script>
const { jsPDF } = window.jspdf;
let finalPdfBlob = null;
let deferredPrompt;

/* انسٹال بٹن اور لاجک */
const installBtn = document.getElementById('installBtn');
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  installBtn.style.display = 'block';
});

window.addEventListener('appinstalled', () => { installBtn.style.display = 'none'; });

installBtn.addEventListener('click', () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => { deferredPrompt = null; });
  } else { alert("Install option is in your browser menu (⋮)."); }
});

/* 15 FAQs Data */
const faqs = [
  {"q": "Is this tool free?", "a": "Yes, our image to PDF converter is 100% free."},
  {"q": "Do I need to sign up?", "a": "No, there is no registration required."},
  {"q": "Is it safe for private files?", "a": "Yes, all processing happens locally on your device."},
  {"q": "Does it work offline?", "a": "Yes, after initial load, it works without internet."},
  {"q": "Which formats are supported?", "a": "We support JPG, PNG, WebP, and BMP."},
  {"q": "Can I use it on iPhone?", "a": "Yes, it works perfectly on all mobile browsers."},
  {"q": "How to order images?", "a": "The PDF follows the order in which you select them."},
  {"q": "Is there a file limit?", "a": "No, but we recommend reasonable batches for speed."},
  {"q": "Will quality drop?", "a": "Only if you select 'Low' quality. HD is high quality."},
  {"q": "How to delete the PDF?", "a": "Just delete it from your device's download folder."},
  {"q": "Is it better than server tools?", "a": "Yes, because it is more secure and faster."},
  {"q": "Do you track my data?", "a": "Absolutely not. We have no servers to store data."},
  {"q": "What if the button fails?", "a": "Refresh the page or clear your browser cache."},
  {"q": "Can I use it for banking documents?", "a": "Yes, it is extremely secure for sensitive documents."},
  {"q": "Is this an official app?", "a": "This is a high-quality, professional web utility tool."}
];

const faqList = document.getElementById('faq-list');
faqs.forEach(item => {
  faqList.innerHTML += `<div class="faq-item"><h4>${item.q}</h4><p>${item.a}</p></div>`;
});

function toggleTheme() {
  document.body.classList.toggle('dark-mode');
  const isDark = document.body.classList.contains('dark-mode');
  document.getElementById('themeBtn').innerText = isDark ? '☀️ Light Mode' : '🌙 Dark Mode';
}

async function convert(){
  let files=document.getElementById("files").files;
  let btn = document.getElementById("convertBtn");
  if(!files.length){ alert("Please select images first"); return; }
  btn.innerText = "Processing..."; 
  const pdf=new jsPDF("p","mm","a4");
  for(let i=0;i<files.length;i++){
    let img=await load(files[i]);
    let canvas=document.createElement("canvas");
    canvas.width=img.width*2; canvas.height=img.height*2;
    let ctx=canvas.getContext("2d"); ctx.scale(2,2); ctx.drawImage(img,0,0);
    let data=canvas.toDataURL("image/jpeg", 0.9);
    if(i>0) pdf.addPage();
    pdf.addImage(data,"JPEG",10,10,190,270);
  }
  finalPdfBlob = pdf.output("blob");
  btn.innerText = "Generated";
  document.getElementById("actionButtons").style.display = "flex";
}

document.getElementById("files").addEventListener("change",e=>{ document.getElementById("preview").innerHTML=""; document.getElementById("actionButtons").style.display = "none"; document.getElementById("convertBtn").innerText = "Generate PDF"; for(let f of e.target.files){ let img=document.createElement("img"); img.src=URL.createObjectURL(f); document.getElementById("preview").appendChild(img); } });
function savePDF() { if(!finalPdfBlob) return; const a = document.createElement("a"); a.href = URL.createObjectURL(finalPdfBlob); a.download = "doc.pdf"; a.click(); }
function load(file){ return new Promise(res=>{ let img=new Image(); img.src=URL.createObjectURL(file); img.onload=()=>res(img); }); }
</script>
